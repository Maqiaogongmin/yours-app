name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          cache: true
      - run: flutter pub get
      - run: dart run tool/check_ui_guard.dart --strict-new
      - name: Android health gate
        env:
          JAVA_21_HOME: ${{ env.JAVA_HOME }}
          MINIMUM_COVERAGE_PERCENT: '65.0'
          MAXIMUM_ANDROID_LINT_WARNINGS: '0'
        run: tool/android_health_check.sh
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-arm64-release-candidate
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

  android-integration:
    needs: flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          cache: true
      - run: flutter pub get
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Android integration smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          script: flutter test integration_test/android_smoke_test.dart -d emulator-5554
