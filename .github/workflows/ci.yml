name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: dart run tool/check_ui_guard.dart --strict-new
      - run: flutter test test/yours_theme_test.dart test/yours_ui_kit_test.dart test/entry_pages_ui_test.dart
      - run: flutter test
      - run: flutter build apk --debug
